services:
  # 1. Backend Django App
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.base
    depends_on:
      - db
      - redis

  # 2. Frontend React App (Vite)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Taaki local node_modules container se mix na ho
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # 3. Database
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      # Default values add kar di hain taaki .env miss hone par bhi chale
      POSTGRES_DB: ${DB_NAME:-shopstack}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5436:5432"

  # 4. Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: